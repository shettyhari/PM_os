kind = "web"
previewPath = "/"
title = "PerformanceOS AI"
version = "1.0.0"
id = "artifacts/performance-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19890

[services.development]
run = "pnpm --filter @workspace/performance-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/performance-os", "run", "build" ]
publicDir = "artifacts/performance-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19890"
BASE_PATH = "/"
